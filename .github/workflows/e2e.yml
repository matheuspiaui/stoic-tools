name: E2E Tests

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    name: E2E (${{ matrix.browser }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run E2E tests (functional)
        run: npx playwright test --config __tests__/playwright.config.ts --project=${{ matrix.browser }} --ignore-snapshots

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7

  e2e-mobile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        device: [mobile-chrome, mobile-safari]
        include:
          - device: mobile-chrome
            browser: chromium
          - device: mobile-safari
            browser: webkit
    name: E2E Mobile (${{ matrix.device }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run mobile E2E tests (functional)
        run: npx playwright test --config __tests__/playwright.config.ts --project=${{ matrix.device }} --ignore-snapshots

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.device }}
          path: playwright-report/
          retention-days: 7

  visual-regression:
    runs-on: ubuntu-latest
    name: Visual Regression
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run visual regression tests
        id: visual
        continue-on-error: true
        run: npx playwright test --config __tests__/playwright.config.ts base/visual-regression

      - name: Upload snapshot diffs
        if: steps.visual.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-diffs
          path: test-results/
          retention-days: 7

  update-snapshots:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [visual-regression]
    name: Update snapshots (if needed)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Update snapshots
        run: npx playwright test --config __tests__/playwright.config.ts base/visual-regression --update-snapshots

      - name: Check for snapshot changes
        id: changes
        run: |
          git add __tests__/snapshots/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated snapshots
        if: steps.changes.outputs.changed == 'true'
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          git commit -m "test: update visual regression snapshots [skip ci]"
          git push
